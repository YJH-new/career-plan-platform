<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>职业晋升阶梯全景平台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071422;
      --bg-2: #0a1d31;
      --panel: #10243b;
      --panel-2: #132c48;
      --panel-3: #0d2035;
      --line: rgba(180, 203, 231, 0.2);
      --line-strong: rgba(180, 203, 231, 0.36);
      --text: #eef6ff;
      --muted: #a8bdd5;
      --soft: #d3e2f2;
      --accent: #39d5c7;
      --accent-2: #f4bd5a;
      --danger: #ff8a80;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      --radius: 8px;
      --content: 1180px;
      --nav-height: 76px;
    }

    body[data-theme="light"] {
      color-scheme: light;
      --bg: #eef4fb;
      --bg-2: #f8fbff;
      --panel: #ffffff;
      --panel-2: #f4f8fd;
      --panel-3: #f8fbff;
      --line: rgba(30, 62, 95, 0.16);
      --line-strong: rgba(30, 62, 95, 0.28);
      --text: #102033;
      --muted: #51667f;
      --soft: #24364d;
      --accent: #0f9e91;
      --accent-2: #bd7a16;
      --shadow: 0 20px 55px rgba(28, 63, 96, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(180deg, rgba(12, 38, 64, 0.86), rgba(7, 20, 34, 0.98) 360px),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      line-height: 1.65;
      letter-spacing: 0;
    }

    body[data-theme="light"] {
      background:
        linear-gradient(180deg, rgba(226, 238, 249, 0.92), rgba(248, 251, 255, 0.98) 360px),
        var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .skip-link {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 50;
      transform: translateY(-150%);
      padding: 8px 12px;
      border-radius: var(--radius);
      background: var(--accent);
      color: #052126;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 20, 34, 0.94);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      width: min(100% - 32px, var(--content));
      min-height: var(--nav-height);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(190px, 0.9fr) minmax(260px, 1.1fr);
      gap: 18px;
      align-items: center;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid rgba(57, 213, 199, 0.55);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: #0c2a3d;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .brand-mark::before {
      content: "";
      width: 19px;
      height: 19px;
      border-left: 3px solid var(--accent);
      border-bottom: 3px solid var(--accent-2);
      transform: rotate(-45deg);
      margin-top: -5px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .tagline {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-wrap {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .search-box {
      position: relative;
      min-width: 0;
    }

    .search-box span {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 15px;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 40px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      outline: none;
    }

    #searchInput::placeholder {
      color: rgba(211, 226, 242, 0.64);
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(57, 213, 199, 0.14);
    }

    .clear-btn,
    .top-btn {
      min-height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #10273f;
      color: var(--soft);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .clear-btn {
      padding: 0 14px;
    }

    .theme-toggle {
      min-height: 44px;
      display: inline-grid;
      grid-template-columns: repeat(2, auto);
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.055);
    }

    .theme-toggle button {
      min-height: 36px;
      min-width: 48px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .theme-toggle button.is-active {
      background: rgba(57, 213, 199, 0.16);
      color: #ffffff;
    }

    .clear-btn:hover,
    .top-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: #15324e;
    }

    .nav-band {
      border-bottom: 1px solid var(--line);
      background: rgba(9, 28, 47, 0.86);
    }

    .major-nav {
      width: min(100% - 32px, var(--content));
      margin: 0 auto;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 11px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(57, 213, 199, 0.6) transparent;
    }

    .major-nav a {
      flex: 0 0 auto;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid rgba(180, 203, 231, 0.18);
      border-radius: 999px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
      white-space: nowrap;
    }

    .major-nav a:hover,
    .major-nav a:focus {
      border-color: var(--accent);
      color: #ffffff;
      outline: none;
    }

    .major-nav a.is-active {
      border-color: rgba(57, 213, 199, 0.75);
      background: rgba(57, 213, 199, 0.12);
      color: #ffffff;
    }

    .hero {
      width: min(100% - 32px, var(--content));
      margin: 34px auto 22px;
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
      gap: 18px;
      align-items: stretch;
    }

    .hero-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(13, 32, 53, 0.84);
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 32px);
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(24px, 3.6vw, 42px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .hero p {
      margin: 14px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      height: 100%;
    }

    .status-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      padding: 14px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .status-value {
      color: var(--accent);
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }

    .status-label {
      color: var(--muted);
      font-size: 12px;
    }

    .content {
      width: min(100% - 32px, var(--content));
      margin: 0 auto 70px;
    }

    .result-note {
      display: none;
      margin: 16px 0;
      border: 1px solid rgba(244, 189, 90, 0.42);
      border-radius: var(--radius);
      padding: 12px 14px;
      background: rgba(244, 189, 90, 0.1);
      color: #ffe0a4;
    }

    .major-section {
      scroll-margin-top: 140px;
      margin: 26px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(9, 27, 45, 0.72);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .major-section[hidden] {
      display: none;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      position: relative;
      min-height: 220px;
      overflow: hidden;
      isolation: isolate;
      padding: 28px 30px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(6, 18, 32, 0.98) 0%, rgba(8, 26, 45, 0.94) 42%, rgba(8, 26, 45, 0.68) 70%, rgba(8, 26, 45, 0.38) 100%),
        var(--major-hero);
      background-position: center right;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .section-head::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 82% 18%, var(--major-accent-soft, rgba(244, 189, 90, 0.18)), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 42%);
      pointer-events: none;
    }

    .section-head > * {
      position: relative;
      z-index: 1;
    }

    .section-kicker {
      margin: 0 0 6px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .section-head h2 {
      margin: 0;
      color: #ffffff;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.2;
      letter-spacing: 0;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.42);
    }

    .section-head p {
      margin: 10px 0 0;
      color: #cfe0f2;
      max-width: 790px;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(57, 213, 199, 0.34);
      border-radius: 999px;
      color: #baf7ef;
      background: rgba(8, 28, 46, 0.72);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.26);
      white-space: nowrap;
      font-size: 12px;
    }

    .section-body {
      padding: 24px;
      display: grid;
      gap: 22px;
    }

    .subhead {
      margin: 0 0 12px;
      color: #ffffff;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, 0.85fr);
      gap: 16px;
    }

    .info-card,
    .track-card,
    .salary-card,
    details,
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .info-card {
      padding: 18px;
    }

    .info-card p {
      margin: 0;
      color: var(--soft);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid rgba(180, 203, 231, 0.22);
      border-radius: 999px;
      padding: 0 10px;
      color: #dcecff;
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;
    }

    .salary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .salary-card {
      padding: 14px;
      min-height: 126px;
      background: var(--panel-2);
    }

    .salary-level {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .salary-range {
      display: block;
      margin-top: 8px;
      color: #ffffff;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.25;
      word-break: break-word;
    }

    .salary-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .tracks-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .track-card {
      padding: 18px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      background: linear-gradient(180deg, rgba(19, 44, 72, 0.98), rgba(16, 36, 59, 0.98));
    }

    .track-title {
      margin: 0;
      color: #ffffff;
      font-size: 17px;
      line-height: 1.35;
    }

    .track-focus {
      margin: 8px 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .ladder {
      position: relative;
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .ladder li {
      position: relative;
      padding: 9px 10px 9px 34px;
      border: 1px solid rgba(180, 203, 231, 0.15);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      color: var(--soft);
      min-height: 42px;
      display: flex;
      align-items: center;
      word-break: break-word;
    }

    .ladder li::before {
      content: attr(data-step);
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(57, 213, 199, 0.16);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
    }

    details {
      background: var(--panel-3);
      overflow: hidden;
    }

    summary {
      min-height: 56px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: #ffffff;
      cursor: pointer;
      list-style: none;
      font-weight: 800;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: "+";
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(57, 213, 199, 0.5);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 20px;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    details[open] summary::after {
      content: "-";
      transform: rotate(180deg);
    }

    .cert-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }

    .cert {
      border: 1px solid rgba(180, 203, 231, 0.18);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      padding: 12px;
      min-height: 72px;
    }

    .cert strong {
      display: block;
      color: #ffffff;
      line-height: 1.35;
      word-break: break-word;
    }

    .cert span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }

    .cert-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .cert-links a {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid rgba(57, 213, 199, 0.42);
      border-radius: 999px;
      color: #baf7ef;
      background: rgba(57, 213, 199, 0.1);
      font-size: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      background: rgba(16, 36, 59, 0.95);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.055);
      font-size: 13px;
      white-space: nowrap;
    }

    td {
      color: var(--soft);
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .top-btn {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 40;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      box-shadow: var(--shadow);
    }

    .top-btn.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .top-btn span {
      color: var(--accent);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .empty-state {
      display: none;
      margin: 26px 0;
      border: 1px solid rgba(255, 138, 128, 0.4);
      border-radius: var(--radius);
      padding: 20px;
      background: rgba(255, 138, 128, 0.1);
      color: #ffd2cd;
    }

    body[data-theme="light"] .topbar {
      background: rgba(248, 251, 255, 0.94);
    }

    body[data-theme="light"] .nav-band {
      background: rgba(236, 244, 252, 0.88);
    }

    body[data-theme="light"] .brand-mark,
    body[data-theme="light"] .clear-btn,
    body[data-theme="light"] .top-btn {
      background: #ffffff;
    }

    body[data-theme="light"] .clear-btn:hover,
    body[data-theme="light"] .top-btn:hover {
      background: #edf8f7;
    }

    body[data-theme="light"] #searchInput,
    body[data-theme="light"] .hero-panel,
    body[data-theme="light"] .major-section {
      background: rgba(255, 255, 255, 0.86);
    }

    body[data-theme="light"] #searchInput::placeholder {
      color: rgba(81, 102, 127, 0.72);
    }

    body[data-theme="light"] .status-item,
    body[data-theme="light"] .tag,
    body[data-theme="light"] .ladder li,
    body[data-theme="light"] .cert,
    body[data-theme="light"] th {
      background: rgba(15, 79, 132, 0.045);
    }

    body[data-theme="light"] .track-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 253, 0.98));
    }

    body[data-theme="light"] .table-wrap {
      background: rgba(255, 255, 255, 0.95);
    }

    body[data-theme="light"] .cert-links a {
      border-color: #0b5f63;
      background: #0f766e;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.18);
      font-weight: 800;
    }

    body[data-theme="light"] .cert-links a:hover,
    body[data-theme="light"] .cert-links a:focus {
      border-color: #0b5f63;
      background: #115e59;
      color: #ffffff;
      outline: 3px solid rgba(15, 118, 110, 0.28);
      outline-offset: 2px;
    }

    body[data-theme="light"] .result-note {
      color: #755009;
      background: rgba(244, 189, 90, 0.16);
    }

    body[data-theme="light"] .empty-state {
      color: #8d2f28;
      background: rgba(255, 138, 128, 0.12);
    }

    body[data-theme="light"] .subhead,
    body[data-theme="light"] .salary-range,
    body[data-theme="light"] .track-title,
    body[data-theme="light"] summary,
    body[data-theme="light"] .cert strong,
    body[data-theme="light"] th {
      color: var(--text);
    }

    body[data-theme="light"] .tag,
    body[data-theme="light"] .major-nav a {
      color: var(--soft);
    }

    body[data-theme="light"] .major-nav a:hover,
    body[data-theme="light"] .major-nav a:focus,
    body[data-theme="light"] .major-nav a.is-active,
    body[data-theme="light"] .theme-toggle button.is-active {
      color: #075b57;
    }

    @media (max-width: 960px) {
      .topbar-inner,
      .hero,
      .overview-grid {
        grid-template-columns: 1fr;
      }

      .topbar-inner {
        gap: 12px;
      }

      .tracks-grid,
      .cert-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      body {
        background:
          linear-gradient(180deg, rgba(12, 38, 64, 0.92), rgba(7, 20, 34, 0.98) 300px),
          var(--bg);
      }

      .topbar-inner,
      .major-nav,
      .hero,
      .content {
        width: min(100% - 22px, var(--content));
      }

      .brand {
        align-items: flex-start;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
      }

      .tagline {
        white-space: normal;
      }

            <section aria-label="电力系统与电网线详细阶梯">

                      <td>0-3年</td>

                      <td>熟悉并严格执行《电力安全工作规程》；具备高压设备操作资质；通过国家电网/南方电网统一招聘考试，热门地区竞争激烈。</td>
                      <td>电工证（高压/低压）、特种作业操作证</td>

                    <tr>

                      <td>积累丰富现场经验和调度操作经验；熟悉电网调度流程和运行规程；通过助理工程师职称评审。</td>

                      <td>6-11年</td>

                      <td>工程师（中级职称）、注册电气工程师（专业考试）</td>

                      <td>正高级工程师职称；行业权威地位和广泛影响力；具备战略视野与资源整合能力。</td>
                      <td>正高级工程师</td>
                    </tr>

            </section>

            <section aria-label="电气工程核心证书明细">
              <h3 class="subhead">核心证书说明</h3>
              <div class="overview-grid">
                <article class="info-card">
                  <h4 class="track-title">电气工程师职称</h4>
                  <p>技术员：本科或学士学位从事本专业技术工作；专科从事本专业技术工作满1年且考察合格。助理工程师：硕士或第二学士学位可认定；本科或学士学位从事本专业技术工作满1年；专科取得技术员职称后满2年。工程师：博士经考核合格；硕士或第二学士学位取得助理工程师后满2年；本科或专科取得助理工程师后满4年。高级工程师：博士取得工程师后满2年；硕士、第二学士、本科取得工程师后满5年。正高级工程师：本科及以上学历，取得高级工程师后满5年，并具备重大工程项目、技术成果和行业影响力。</p>
                </article>
                <article class="info-card">
                  <h4 class="track-title">注册电气工程师</h4>
                  <p>注册电气工程师分为供配电和发输变电两个方向。基础考试包括公共基础和专业基础，总分240分，通常132分合格；专业考试包括专业知识和专业案例，总分200分，通常120分合格。基础考试和专业考试均需在一个考试年度内通过全部科目。基础考试通过率约20-30%，专业考试通过率约10%，是设计院、工程公司的核心资质。</p>
                </article>
                <article class="info-card">
                  <h4 class="track-title">电工证与安全资质</h4>
                  <p>电工证（高压/低压）和特种作业操作证是电气设备操作、维护、检修的法定准入资格。注册安全工程师适合电力安全、施工安全、设备安全和新能源场站安全方向。对于从现场走向管理的电气人才，安全资质会显著增强岗位适配度。</p>
                </article>
                <article class="info-card">
                  <h4 class="track-title">项目与工程管理证书</h4>
                  <p>PMP适合项目管理、自动化集成、新能源工程和研发项目负责人；一级建造师（机电工程）适合工程管理方向，是项目经理和大型机电工程管理岗位的重要资质。自动化工程师、PLC/工业机器人相关认证适合工业自动化现场调试、产线集成和设备研发岗位。</p>
                </article>
              </div>
            </section>

            <section aria-label="计算机技术研发线详细阶梯">
              <h3 class="subhead">赛道1：技术研发线（深耕技术）</h3>
              <p class="section-note">面向互联网企业、软件公司、科技企业研发部门，从事软件系统设计、开发、测试、架构等工作。该赛道以技术深度为核心，从功能实现走向架构设计和技术战略。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr>
                      <td>第1级：初级软件工程师</td>
                      <td>1-2年</td>
                      <td>0-2年</td>
                      <td><ul><li>在资深工程师指导下完成开发任务，按技术方案进行功能模块编码和单元测试。</li><li>参与代码审查，学习代码规范和最佳实践，提升代码质量与工程意识。</li><li>负责分配功能的Bug修复，对生产环境问题进行排查和解决。</li><li>参与需求评审和技术方案讨论，理解业务需求和技术实现。</li><li>编写接口文档、设计文档、部署文档等技术文档。</li></ul></td>
                      <td>熟练掌握至少一门主流编程语言；理解数据结构和算法；熟悉Git、CI/CD等开发流程和工具链；能够独立完成中等复杂度功能模块。</td>
                      <td>软考初级（程序员）</td>
                    </tr>
                    <tr>
                      <td>第2级：中级软件工程师</td>
                      <td>2-3年</td>
                      <td>2-5年</td>
                      <td><ul><li>独立负责模块或子系统开发与维护，从需求分析、方案设计、编码到测试上线全流程负责。</li><li>参与系统设计和方案评审，识别技术风险和性能瓶颈。</li><li>指导初级工程师，进行代码审查并传授最佳实践。</li><li>承担性能优化、并发处理、系统稳定性等技术攻关任务。</li><li>参与技术选型，对新技术和新框架进行验证。</li></ul></td>
                      <td>掌握分布式系统、微服务架构、数据库设计等系统设计能力；具备工程规范意识；能够独立解决复杂技术问题并在团队中形成技术影响力。</td>
                      <td>软考中级（软件设计师）</td>
                    </tr>
                    <tr>
                      <td>第3级：高级软件工程师/技术专家</td>
                      <td>3-4年</td>
                      <td>5-9年</td>
                      <td><ul><li>主导核心模块或系统架构设计，负责技术选型、架构方案和关键技术决策。</li><li>对重点项目进行技术可行性分析和风险评估。</li><li>带领5-8人技术团队完成项目，分配任务并把控技术质量。</li><li>深度审查和优化AI生成代码，判断AI代码的质量、安全性和合理性。</li><li>制定团队技术标准，推动技术债务治理和技术能力提升。</li></ul></td>
                      <td>在分布式系统、大数据、AI、高并发等领域形成深厚积累；具备系统架构设计、技术决策、风险评估和团队培养能力。</td>
                      <td>软考高级（系统架构设计师/系统分析师）</td>
                    </tr>
                    <tr>
                      <td>第4级：技术负责人/架构师</td>
                      <td>4-6年</td>
                      <td>9-15年</td>
                      <td><ul><li>主导项目技术选型和架构设计，推进跨系统、跨团队架构方案。</li><li>将AI作为团队生产力倍增器，推动AI辅助开发工具和流程落地。</li><li>定义技术标准和规范体系，建立技术治理框架和架构评审机制。</li><li>参与公司级技术战略制定，对平台建设和技术投资提出建议。</li><li>处理系统级重大技术问题和生产故障，做出应急技术决策。</li></ul></td>
                      <td>深厚技术功底与系统架构视野融合；跨团队协调能力和技术影响力；技术创新与落地能力；行业趋势洞察力。</td>
                      <td>软考高级（系统架构设计师/系统分析师）</td>
                    </tr>
                    <tr>
                      <td>第5级：首席架构师/技术总监</td>
                      <td>5年以上</td>
                      <td>15年以上</td>
                      <td><ul><li>负责公司整体技术架构规划，确定技术路线、技术栈和基础设施方向。</li><li>负责重大技术决策，对关键技术选择、技术投资和技术风险负总责。</li><li>建设技术团队和人才梯队，建立技术专家体系。</li><li>站在业务与技术交汇点定义技术方向，确保技术战略与业务战略协同。</li><li>代表公司参与行业技术交流和标准制定，提升技术品牌。</li></ul></td>
                      <td>行业影响力+战略视野+资源整合能力；能够在业务与技术交汇点定义技术方向。</td>
                      <td>软考高级（系统架构设计师/系统规划与管理师）</td>
                    </tr>
                    <tr>
                      <td>第6级：CTO/技术副总裁</td>
                      <td>—</td>
                      <td>15年以上</td>
                      <td><ul><li>负责公司整体技术战略制定，将技术能力转化为核心竞争力。</li><li>负责技术团队与文化建设，打造创新力和执行力兼备的技术组织。</li><li>通过技术大会、开源项目、技术博客等塑造对外技术品牌。</li><li>推动技术驱动业务增长，通过技术创新创造商业价值。</li><li>参与最高决策层，对公司战略、资源配置和组织架构提供技术视角。</li></ul></td>
                      <td>卓越战略思维、商业洞察力和领导力；行业权威地位；技术与业务深度融合能力。</td>
                      <td>无特定要求</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>

            <section aria-label="计算机技术管理线详细阶梯">
              <h3 class="subhead">赛道2：技术管理线（技术+管理）</h3>
              <p class="section-note">从技术岗位起步，逐步转向技术团队管理和项目管理，最终进入公司管理层。该赛道以团队价值为导向，适合兼具技术能力和管理潜质的人群。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr><td>第1级：初级软件工程师</td><td>1-2年</td><td>0-2年</td><td>与技术研发线第1级相同，同时主动承担团队内部沟通、文档整理、流程协助等组织性工作。</td><td>在技术扎实基础上展现沟通协调和团队协作能力。</td><td>软考初级（程序员）</td></tr>
                    <tr>
                      <td>第2级：中级软件工程师/技术组长</td>
                      <td>2-3年</td>
                      <td>2-5年</td>
                      <td><ul><li>除技术开发外，开始带领3-5人的小型开发小组。</li><li>负责任务分配与进度跟进，协调解决开发中的问题。</li><li>指导新人并进行代码审查，帮助新员工融入团队。</li><li>参与项目计划制定和评估，对工作量、技术风险和里程碑提出专业意见。</li><li>组织团队技术分享和知识传递。</li></ul></td>
                      <td>技术能力+初步管理能力；跨部门沟通协调能力；项目推进能力。</td>
                      <td>软考中级（软件设计师）、PMP（建议开始学习）</td>
                    </tr>
                    <tr>
                      <td>第3级：技术经理/项目经理</td>
                      <td>3-4年</td>
                      <td>5-9年</td>
                      <td><ul><li>带领5-15人技术团队，负责技术方向、项目交付和人员管理。</li><li>制定项目计划，分配人力资源，控制项目成本。</li><li>负责技术方案评审和决策，确保技术路线合理可行。</li><li>进行团队绩效管理，激励成员持续提升。</li><li>与产品、运营、测试等上下游团队沟通，确保跨部门协作顺畅。</li></ul></td>
                      <td>技术判断力+团队管理能力；项目风险管控能力；业务理解深度；完成从技术思维到管理思维的重构。</td>
                      <td>软考中级/高级、PMP</td>
                    </tr>
                    <tr>
                      <td>第4级：研发总监</td>
                      <td>4-6年</td>
                      <td>9-15年</td>
                      <td><ul><li>管理多个技术团队（30-100人），负责研发体系整体运作和持续优化。</li><li>建设研发流程、质量管理体系和技术治理框架。</li><li>统筹研发预算和资源投入，优化资源配置效率。</li><li>与产品、运营、市场等部门进行战略层面协作。</li><li>培养技术管理人才，打造有战斗力的研发组织。</li></ul></td>
                      <td>卓越管理能力+战略思维；发挥业务与技术桥梁作用；形成组织影响力。</td>
                      <td>软考高级（信息系统项目管理师）</td>
                    </tr>
                    <tr>
                      <td>第5级：技术副总裁（VP of Engineering）</td>
                      <td>5年以上</td>
                      <td>15年以上</td>
                      <td><ul><li>负责公司整体研发体系管理，建立高效研发组织和流程。</li><li>制定技术人才战略，负责招聘、培养、激励和留任。</li><li>建设以技术卓越、持续创新、追求极致为核心的技术文化。</li><li>支撑业务增长，确保技术能力支撑业务扩张和战略转型。</li><li>参与最高管理层决策，从技术视角提供建议。</li></ul></td>
                      <td>行业影响力+卓越领导力+商业思维。</td>
                      <td>软考高级（信息系统项目管理师/系统规划与管理师）</td>
                    </tr>
                    <tr>
                      <td>第6级：CTO/CEO（技术背景）</td>
                      <td>—</td>

            <section aria-label="计算机核心证书明细">

              <div class="overview-grid">
                <article class="info-card">
                  <h4 class="track-title">软考与职称</h4>
                  <p>软考是IT行业最具普惠性的职业资格考试之一。报考不受学历、资历条件限制，只要达到相应技术水平即可报考相应级别和专业。软考实行“以考代评”，通过考试取得相应级别资格，即具备相应职称资格；持有高级证书后，聘任高级工程师通常还需满足单位聘任和当地职称政策要求。目前软考已实现中日、中韩互认。</p>
                </article>
                <article class="info-card">
                  <h4 class="track-title">项目与云原生</h4>
                  <p>PMP适合技术人员向项目经理、技术经理、研发总监转型。CKA适合云原生、容器平台、运维和DevOps背景从业者，是Kubernetes管理能力的实操型认证。TOGAF适合系统架构师、企业架构师和技术规划岗位。</p>
                </article>
                <article class="info-card">
                  <h4 class="track-title">安全与数据</h4>

                </article>
                <article class="info-card">
                  <h4 class="track-title">AI、信创与服务管理</h4>

                </article>
              </div>
            </section>

            <section aria-label="机械工程机器人方向关键数据说明">
              <h3 class="subhead">关键数据说明</h3>
              <div class="overview-grid">
                <article class="info-card">
                  <p>机器人领域应届生平均月薪超1.8万元，机器人研发工程师综合年收入约20万-35万元，控制算法工程师年薪约25万-40万元，头部车企机器人/智能制造方向应届生起薪可达28万-35万元/年。</p>
                </article>
                <article class="info-card">
                  <p>全国性机器人技术技能竞赛获奖可作为高级职称破格申报的重要条件。机器人专业职称评审已在北京落地实施，核心零部件、算法与软件、整机设计与制造、系统集成与应用四大评审方向覆盖产业链关键环节。</p>
                </article>
              </div>
            </section>

            <section aria-label="机械工程机器人方向薪资参考明细">
              <h3 class="subhead">机械工程（机器人方向）薪资参考（2026年）</h3>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>赛道</th><th>层级</th><th>年薪范围（税前）</th></tr></thead>
                  <tbody>
                    <tr><td>技术研发线</td><td>助理工程师/研发助理</td><td>8-15万</td></tr>
                    <tr><td>技术研发线</td><td>工程师/研发工程师</td><td>15-30万</td></tr>
                    <tr><td>技术研发线</td><td>高级工程师/技术专家</td><td>25-50万</td></tr>
                    <tr><td>技术研发线</td><td>正高级工程师/首席科学家</td><td>50-100万+</td></tr>
                    <tr><td>系统集成线</td><td>技术员/调试员</td><td>5-8万</td></tr>
                    <tr><td>系统集成线</td><td>系统集成工程师/应用工程师</td><td>12-25万</td></tr>
                    <tr><td>系统集成线</td><td>高级应用工程师/技术主管</td><td>20-40万</td></tr>
                    <tr><td>系统集成线</td><td>技术总监/总工程师</td><td>40-80万+</td></tr>
                    <tr><td>技术管理线</td><td>工程师/项目主管</td><td>15-25万</td></tr>
                    <tr><td>技术管理线</td><td>技术经理/项目经理</td><td>20-40万</td></tr>
                    <tr><td>技术管理线</td><td>研发总监/事业部总经理</td><td>40-80万+</td></tr>
                  </tbody>
                </table>
              </div>
              <div class="overview-grid">
                <article class="info-card">
                  <p>特别说明：机器人领域应届生平均月薪超1.8万元；控制算法工程师年薪25-40万元；头部车企机器人/智能制造方向应届生起薪28万-35万元/年；机械工程师平均招聘月薪12,784元，机械结构工程师13,729元。</p>
                </article>
              </div>
            </section>

            <section aria-label="机器人技术研发线详细阶梯">
              <h3 class="subhead">赛道1：技术研发线（核心零部件/算法与软件/整机设计）</h3>
              <p class="section-note">面向机器人本体制造企业、核心零部件企业、算法与软件研发企业、科研院所等，从事核心零部件研发、算法与软件开发、整机结构设计与优化。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr>
                      <td>第1级：助理工程师/研发助理</td>
                      <td>1-2年</td>
                      <td>0-2年</td>
                      <td><ul><li>协助精密减速器、伺服电机、高性能控制器等核心零部件研发与测试，参与样机装配、性能测试和数据记录。</li><li>参与运动控制、轨迹规划、力控制等算法模块编写与调试，在指导下完成算法实现和单元测试。</li><li>协助整机结构设计与仿真验证，使用SolidWorks、CATIA等进行三维建模，使用ANSYS等进行强度和刚度分析。</li><li>负责实验数据采集、整理和初步分析，编写实验报告和技术文档。</li><li>参与机器人样机组装和调试，学习机器人系统整体架构。</li></ul></td>
                      <td>通过机器人专业初级职称评审；掌握SolidWorks/CATIA/ANSYS/MATLAB等至少一种专业设计或仿真软件；熟悉运动学、动力学、控制理论等机器人基础原理。</td>
                      <td>助理工程师职称</td>
                    </tr>
                    <tr>
                      <td>第2级：工程师/研发工程师</td>
                      <td>3-5年</td>
                      <td>3-7年</td>
                      <td><ul><li>独立承担机器人核心零部件设计与优化，负责概念设计、详细设计、样机制造到性能测试完整流程。</li><li>独立开发与迭代运动学与动力学算法、路径规划算法、力/位混合控制算法等。</li><li>主导整机结构详细设计与工程验证，进行结构优化、轻量化设计和可靠性分析。</li><li>负责机器人系统集成调试，协调机械、电气、软件等多学科联调。</li><li>撰写技术方案、设计文档、测试报告，并指导助理工程师和实习生。</li></ul></td>
                      <td>通过机器人专业中级职称评审；具备从概念到样机的完整研发项目经验；本科学历通常需取得助理工程师后满4年，硕士通常满2年。</td>
                      <td>工程师（中级职称）、机械工程师资格证</td>
                    </tr>
                    <tr>
                      <td>第3级：高级工程师/技术专家</td>
                      <td>4-6年</td>
                      <td>7-13年</td>
                      <td><ul><li>主导机器人核心技术攻关，解决高精度减速器传动精度、高动态响应控制算法、系统稳定性等关键问题。</li><li>制定技术路线和研发标准，确定产品技术方案和研发方向。</li><li>指导具身智能、人机协作、仿生机器人等前沿技术研究。</li><li>在核心零部件、算法或整机设计细分领域形成技术积累和行业认可。</li><li>负责技术培训和能力建设，参与行业技术交流和标准制定。</li></ul></td>
                      <td>通过机器人专业副高级职称评审；具备发明专利、技术标准制定等成果；全国性机器人技术技能竞赛获奖可破格申报。</td>
                      <td>高级工程师（副高级职称）</td>
                    </tr>
                    <tr>
                      <td>第4级：正高级工程师/首席科学家</td>
                      <td>5年以上</td>
                      <td>13年以上</td>
                      <td><ul><li>引领机器人前沿技术方向，制定企业技术战略和长期研发规划，布局核心专利和知识产权。</li><li>主持国家级重大科研项目，推动核心技术突破和产业化。</li><li>推动核心技术国产化与产业化，将实验室成果转化为市场竞争力。</li><li>作为行业技术权威参与国家或行业标准制定与评审。</li><li>建设企业技术梯队，培养顶级技术人才，代表企业参与国际合作和学术交流。</li></ul></td>
                      <td>通过机器人专业正高级职称评审；具备行业影响力与学术地位；形成重大技术突破或产业化成果。</td>
                      <td>正高级工程师</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>

            <section aria-label="机器人系统集成与应用线详细阶梯">
              <h3 class="subhead">赛道2：系统集成与应用线（整机设计与制造/系统集成与应用）</h3>
              <p class="section-note">面向机器人系统集成商、自动化产线集成商、智能制造企业等，从事机器人工作站/产线系统集成设计、自动化方案制定、现场调试与交付。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr>
                      <td>第1级：技术员/调试员</td>
                      <td>1-2年</td>
                      <td>0-2年</td>
                      <td><ul><li>负责工业机器人现场安装、调试、示教编程和路径优化，确保系统正常运行。</li><li>负责机器人系统日常运维与故障诊断，进行设备巡检、预防性维护和应急抢修。</li><li>按照调试规范完成机器人工作站单机调试和联调联试。</li><li>参与自动化产线现场实施，协助设备安装、接线、调试和验收。</li><li>编写调试记录、运维日志和故障处理报告，并向客户提供基础培训。</li></ul></td>
                      <td>掌握机器人操作与编程基础；具备PLC基础、电气控制原理等电气自动化知识；能阅读机械和电气图纸。</td>
                      <td>电工证（低压/高压）、工业机器人系统操作员</td>
                    </tr>
                    <tr>
                      <td>第2级：系统集成工程师/应用工程师</td>
                      <td>2-4年</td>
                      <td>2-6年</td>
                      <td><ul><li>负责机器人工作站/产线系统集成设计，包括方案设计、设备选型、布局规划、电气设计和控制系统设计。</li><li>根据客户需求制定焊接、搬运、装配、涂装等机器人应用方案。</li><li>负责自动化生产线调试与优化，进行整线联调、节拍优化和工艺验证。</li><li>负责项目现场技术管理，协调机械、电气、软件等专业工作。</li><li>撰写系统集成方案书、技术规格书、操作手册，并参与售前技术支持。</li></ul></td>
                      <td>通过机器人专业中级职称评审；具备从方案设计到现场交付的完整项目集成经验；掌握PLC编程、机器人编程、机器视觉等综合技能。</td>
                      <td>工程师（中级职称）、工业机器人系统集成工程师、PLC工程师认证</td>
                    </tr>
                    <tr>
                      <td>第3级：高级应用工程师/技术主管</td>
                      <td>3-5年</td>
                      <td>6-11年</td>
                      <td><ul><li>主导大型智能制造项目系统集成，负责整体技术方案、技术架构和实施路径。</li><li>管理5-15人技术团队，分配技术任务、把控项目进度、协调内外部资源。</li><li>与客户进行高层级技术沟通，制定并交付客户技术方案。</li><li>识别和管控项目技术风险，制定应急预案确保项目交付。</li><li>总结项目经验，形成技术积累和最佳实践，推动新业务和新技术开拓。</li></ul></td>
                      <td>通过机器人专业副高级职称评审；具备深厚系统集成经验与团队管理能力；具备机械、电气、软件、工艺跨领域整合能力。</td>
                      <td>高级工程师（副高级职称）</td>
                    </tr>
                    <tr>
                      <td>第4级：技术总监/总工程师</td>
                      <td>5年以上</td>

                      <td>助理工程师职称</td>
                    </tr>
                    <tr>
                      <td>第2级：材料研发工程师</td>
                      <td>2-4年</td>
                      <td>2-6年</td>

            <section aria-label="微电子集成电路关键数据说明">
              <h3 class="subhead">关键数据说明</h3>

                <article class="info-card">
                  <p>微电子科学与工程是2022-2026年唯一连续五年上榜的绿牌专业。2023-2025届本科毕业生毕业半年月收入7814元，位居全榜单薪资第一；一线城市应届本科综合年薪约14-20万，IC设计方向硕士应届约20-30万。</p>

            <section aria-label="微电子IC设计线详细阶梯">
              <h3 class="subhead">赛道1：IC设计线（薪资天花板最高，核心赛道）</h3>
              <p class="section-note">面向集成电路设计企业、EDA工具厂商、芯片设计服务公司，从事数字IC、模拟IC、射频IC、芯片验证、版图设计等工作。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr>
                      <td>第1级：IC设计助理/初级设计工程师</td>
                      <td>1-2年</td>
                      <td>0-2年</td>
                      <td><ul><li>协助资深工程师进行电路设计与仿真验证，参与RTL编码、模块级验证或模拟子电路设计。</li><li>完成代码编写、仿真波形分析、设计文档整理和版本管理。</li><li>参与芯片验证测试、测试方案制定和测试数据分析。</li><li>学习Cadence、Synopsys、Mentor等EDA工具和IC设计流程。</li><li>参与设计评审会议，学习设计文档规范和设计方法学。</li></ul></td>
                      <td>掌握数电、模电、信号与系统等基础；熟悉IC开发流程和EDA工具；具备Verilog/VHDL/Spice等基本编程能力。</td>
                      <td>助理工程师职称</td>
                    </tr>
                    <tr>
                      <td>第2级：IC设计工程师</td>
                      <td>2-3年</td>
                      <td>2-5年</td>
                      <td><ul><li>独立负责芯片模块设计与验证，从规格定义、架构设计、RTL编码/电路设计到功能仿真。</li><li>参与逻辑综合、时序分析、形式验证、功耗分析等全流程开发。</li><li>解决时序收敛、功耗优化、面积优化、信号完整性等技术难题。</li><li>参与至少1次完整流片项目，负责部分模块设计与验证。</li><li>撰写设计文档和验证报告，指导初级工程师和实习生。</li></ul></td>
                      <td>具备至少1次流片经验；通过中级职称评审；本科学历通常需取得助理工程师后工作满4年。</td>
                      <td>工程师（中级职称）</td>
                    </tr>
                    <tr>
                      <td>第3级：高级IC设计工程师/设计经理</td>
                      <td>3-4年</td>
                      <td>5-9年</td>
                      <td><ul><li>主导芯片架构设计与技术选型，确定架构、模块划分、接口定义和设计规格。</li><li>带领3-8人设计团队完成项目交付，把控设计质量并协调前后端协作。</li><li>负责设计评审、验证覆盖率分析、时序签核、功耗签核等质量把控。</li><li>参与测试方案制定和硅后调试，解决流片后的功能和性能问题。</li><li>负责工艺节点选择、IP选型、设计方法学优化等关键决策。</li></ul></td>
                      <td>具备3年以上项目经验；通过高级工程师评审；博士通常需受聘工程师满2年，硕士/本科通常满5年。</td>
                      <td>高级工程师（副高级职称）</td>
                    </tr>
                    <tr>
                      <td>第4级：资深IC架构师/技术专家</td>
                      <td>4-6年</td>
                      <td>9-15年</td>
                      <td><ul><li>制定芯片技术路线和架构方案，确定微架构、性能、功耗和面积目标。</li><li>解决高性能计算架构、低功耗设计、高可靠性设计等重大难题。</li><li>参与行业标准制定和技术路线图规划，跟踪国际先进技术与工艺节点。</li><li>指导团队技术创新和架构优化，培养高级设计人才。</li><li>负责技术风险评估和技术决策，代表公司参与行业交流。</li></ul></td>
                      <td>具备8年以上项目经验；深厚芯片设计功底与系统架构视野；具备行业影响力和技术创新能力。</td>
                      <td>高级工程师/正高级工程师</td>
                    </tr>
                    <tr>
                      <td>第5级：研发总监/技术副总裁</td>
                      <td>5年以上</td>
                      <td>15年以上</td>
                      <td><ul><li>负责公司整体芯片研发战略，确定研发方向、产品路线和技术布局。</li><li>建设研发体系、质量管理体系和技术治理框架。</li><li>对芯片产品技术方向、工艺选择、IP策略等重大事项做决策。</li><li>统筹研发预算和资源配置，优化研发效率和产出。</li><li>参与行业战略合作和技术联盟，培养研发管理梯队和技术领军人才。</li></ul></td>
                      <td>卓越技术判断力、战略思维和团队管理能力；具备行业权威地位与资源整合能力。</td>
                      <td>正高级工程师</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>

            <section aria-label="微电子IC制造与工艺线详细阶梯">
              <h3 class="subhead">赛道2：IC制造与工艺线（产业基础，人才最紧缺）</h3>
              <p class="section-note">面向晶圆制造企业、IDM企业制造部门，从事晶圆制造工艺研发、工艺整合、设备工程、良率提升等工作。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr><td>第1级：工艺助理工程师/设备助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助光刻、刻蚀、薄膜沉积、离子注入等关键工艺模块调试优化；参与半导体设备维护和故障处理；收集工艺数据并监控参数稳定性；执行洁净室操作和工艺安全规范。</td><td>熟悉半导体制造工艺流程；掌握基本设备操作与维护技能；具备数据分析和问题解决能力。</td><td>助理工程师职称</td></tr>
                    <tr><td>第2级：工艺工程师/制程整合工程师</td><td>2-4年</td><td>2-6年</td><td>独立负责工艺模块开发与优化；解决工艺偏移、缺陷等产线异常；参与新工艺/新产品导入；协调各工艺模块匹配和整合；撰写工艺规格书、操作指导书、控制计划、FMEA等文件；参与良率提升项目。</td><td>具备产线实操经验和工艺问题解决能力；通过中级职称评审。</td><td>工程师（中级职称）</td></tr>
                    <tr><td>第3级：高级工艺工程师/工艺技术主管</td><td>3-5年</td><td>6-11年</td><td>主导工艺技术攻关与良率提升项目；管理5-15人工艺团队；参与新产线建设与工艺验证，从设备选型到量产爬坡全过程参与；制定工艺技术标准；主导新一代芯片制程研发。</td><td>通过高级工程师评审；具备深厚工艺技术积累和团队管理能力。</td><td>高级工程师（副高级职称）</td></tr>
                    <tr><td>第4级：工艺技术总监/晶圆厂厂长</td><td>5年以上</td><td>11年以上</td><td>负责晶圆厂整体技术管理、工艺路线、设备选型和产能规划；优化生产流程；负责质量体系与成本控制；建设生产运营团队；参与公司战略决策；推动智能制造和数字化转型。</td><td>卓越管理能力+技术深度+战略视野；通常要求正高级工程师或同等能力积累。</td><td>正高级工程师</td></tr>
                  </tbody>
                </table>
              </div>
            </section>

            <section aria-label="微电子IC封测线详细阶梯">
              <h3 class="subhead">赛道3：IC封测线（产业链重要环节）</h3>
              <p class="section-note">面向封装测试企业、IDM企业封测部门，从事芯片封装工艺开发、测试方案设计、可靠性验证等工作。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr><td>第1级：封装/测试助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助封装工艺开发与测试方案制定；使用ATE、探针台、测试机等设备进行功能测试和参数测试；收集整理测试数据；参与可靠性试验和失效分析；学习BGA、QFP、CSP等封装形式和测试技术。</td><td>熟悉封装工艺流程或FT、CP等测试方法；掌握基本数据分析能力。</td><td>助理工程师职称</td></tr>

            <section aria-label="电子科学与技术详细阶梯">
              <h3 class="subhead">方向一：电子科学与技术</h3>
              <p class="section-note">电子科学与技术是现代信息技术的基础学科，涵盖微电子、光电子、物理电子、电磁场与微波等方向，是集成电路、半导体、通信、计算机等产业的学科根基。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>赛道</th><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr><td>硬件研发线</td><td>助理工程师/研发储干</td><td>1-2年</td><td>0-2年</td><td>协助原理图设计、PCB布局布线、元器件选型、硬件调试、BOM维护和设计文档编写，学习Altium Designer、Cadence、PADS等工具。</td><td>掌握模拟电路、数字电路、电源设计等基础；熟悉EDA工具；具备动手能力和逻辑思维。</td><td>助理工程师职称</td></tr>
                    <tr><td>硬件研发线</td><td>硬件工程师/电子工程师</td><td>2-3年</td><td>2-5年</td><td>独立负责硬件设计开发，从方案、原理图、PCB到调试测试；支持贴片、试产、量产和认证；解决硬件故障并编写设计规格书、测试计划、DFMEA。</td><td>通过中级职称评审；具备从方案到量产的完整项目经验；本科学历通常需取得助理工程师后满4年。</td><td>工程师（中级职称）</td></tr>
                    <tr><td>硬件研发线</td><td>高级硬件工程师/硬件主管工程师</td><td>3-4年</td><td>5-9年</td><td>主导硬件系统架构设计，审核团队方案，解决信号完整性、电源完整性、EMC/EMI等复杂问题，推动硬件平台标准化和专利布局。</td><td>通过高级工程师评审；硕士/本科通常需受聘工程师满5年；具备深厚技术积累和系统架构能力。</td><td>高级工程师（副高级职称）</td></tr>
                    <tr><td>硬件研发线</td><td>硬件主任工程师/技术专家</td><td>4-6年</td><td>9-15年</td><td>制定公司硬件技术路线，负责重大技术决策与技术攻关，参与行业标准制定，建设硬件技术梯队，代表公司参与技术交流。</td><td>行业影响力；技术深度与战略视野；通过正高级工程师评审。</td><td>正高级工程师</td></tr>
                    <tr><td>硬件研发线</td><td>总工程师/技术总监</td><td>5年以上</td><td>15年以上</td><td>负责公司整体技术战略、研发布局和产品路线，建设研发体系和技术治理框架，引领前沿技术落地，提升技术品牌和行业地位。</td><td>卓越技术判断力、战略思维和管理能力；具备行业权威地位。</td><td>正高级工程师</td></tr>
                    <tr><td>半导体与微电子线</td><td>半导体工艺/设备助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助光刻、刻蚀、薄膜沉积、离子注入等工艺模块调试优化；参与半导体设备调试维护；收集工艺数据，执行洁净室规范。</td><td>熟悉半导体制造工艺流程；掌握基本设备操作技能。</td><td>助理工程师职称</td></tr>
                    <tr><td>半导体与微电子线</td><td>半导体工艺/设备工程师</td><td>2-4年</td><td>2-6年</td><td>独立优化关键工艺参数，诊断产线工艺异常，参与新工艺导入，编写工艺规格书、控制计划、FMEA，参与良率提升项目。</td><td>通过中级职称评审；具备产线实操经验和工艺问题解决能力。</td><td>工程师（中级职称）</td></tr>
                    <tr><td>半导体与微电子线</td><td>高级半导体工程师</td><td>3-5年</td><td>6-11年</td><td>主导工艺攻关和良率提升，管理5-15人工艺团队，参与新产线建设与工艺验证，建立工艺规范体系。</td><td>通过高级工程师评审；具备深厚工艺技术积累和团队管理能力。</td><td>高级工程师（副高级职称）</td></tr>
                    <tr><td>半导体与微电子线</td><td>半导体技术总监/晶圆厂厂长</td><td>5年以上</td><td>11年以上</td><td>负责晶圆厂技术管理、工艺路线、设备选型和产能规划，统筹质量体系、成本控制和工厂团队建设。</td><td>卓越管理能力+技术深度+战略视野；正高级工程师。</td><td>正高级工程师</td></tr>
                    <tr><td>射频与微波技术线</td><td>射频助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助射频前端、功率放大器、低噪声放大器等模块设计调试，使用频谱仪、网络分析仪、信号源进行测试，参与天线设计调试。</td><td>掌握传输线理论、匹配网络、S参数等射频基础；熟悉射频测试仪器。</td><td>助理工程师职称</td></tr>
                    <tr><td>射频与微波技术线</td><td>射频工程师</td><td>2-4年</td><td>2-6年</td><td>独立负责射频电路设计、仿真、原理图和PCB布局；参与天线设计与调试；优化增益、噪声系数、线性度、效率等指标。</td><td>通过中级职称评审；具备完整射频项目经验。</td><td>工程师（中级职称）</td></tr>
                    <tr><td>射频与微波技术线</td><td>高级射频工程师/射频技术专家</td><td>3-5年</td><td>6-11年</td><td>主导射频系统架构设计，解决互调干扰、杂散抑制、相位噪声优化等难题，推动射频技术路线规划和文档标准化。</td><td>通过高级工程师评审；具备深厚射频技术积累。</td><td>高级工程师（副高级职称）</td></tr>
                  </tbody>
                </table>
              </div>
              <div class="overview-grid"><article class="info-card"><p>电子科学与技术薪资参考：应届平均月薪8064元，半导体行业资深工程师年薪30-60万，射频工程师年薪25-50万。</p></article></div>
            </section>

            <section aria-label="光电信息科学与工程详细阶梯">
              <h3 class="subhead">方向二：光电信息科学与工程</h3>
              <p class="section-note">光电信息科学与工程是光电子、信息显示、激光技术、光纤通信等领域的交叉学科，是6G通信、人工智能、自动驾驶、高端制造与数字经济的重要技术底座。</p>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>赛道</th><th>层级</th><th>建议停留</th><th>累计年限</th><th>核心工作内容</th><th>晋升关键要求</th><th>对应证书</th></tr></thead>
                  <tbody>
                    <tr><td>光通信与光电器件线</td><td>光电助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助光模块、激光器、探测器、调制器等光器件研发测试；使用光功率计、光谱仪、OTDR进行测试；学习Zemax、Code V等软件。</td><td>掌握几何光学、物理光学、光电子学基础；熟悉光学软件。</td><td>助理工程师职称、助理光电工程师</td></tr>
                    <tr><td>光通信与光电器件线</td><td>光电工程师/光通信工程师</td><td>2-4年</td><td>2-6年</td><td>独立负责光模块/光器件研发，参与光通信系统设计测试，优化光耦合效率、灵敏度、消光比等指标，参与可靠性验证和失效分析。</td><td>通过中级职称评审；具备完整项目经验。</td><td>工程师（中级职称）、光电工程师</td></tr>
                    <tr><td>光通信与光电器件线</td><td>高级光电工程师/光学设计专家</td><td>3-5年</td><td>6-11年</td><td>主导光电系统架构设计和光学仿真优化，解决像差、偏振控制、非线性效应等问题，参与行业交流和标准制定。</td><td>通过高级工程师评审；具备深厚光电技术积累。</td><td>高级工程师（副高级职称）、高级光电工程师</td></tr>
                    <tr><td>光通信与光电器件线</td><td>光电技术总监/首席科学家</td><td>5年以上</td><td>11年以上</td><td>制定光电技术战略和产品路线，负责重大研发项目决策，推动核心技术突破和成果转化，代表公司参与行业标准制定。</td><td>正高级工程师；行业影响力与重大技术突破。</td><td>正高级工程师</td></tr>
                    <tr><td>激光技术与先进制造线</td><td>激光工艺助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助激光切割、焊接、打标、增材制造等工艺开发测试，操作维护激光设备，记录加工数据并参与设备装配调试。</td><td>掌握激光物理、激光加工原理等基础；熟悉激光设备操作。</td><td>助理工程师职称</td></tr>
                    <tr><td>激光技术与先进制造线</td><td>激光工艺工程师</td><td>2-4年</td><td>2-6年</td><td>独立优化激光加工参数，参与高端激光装备研发，制定工艺规范和操作指导书，为客户提供激光加工解决方案。</td><td>通过中级职称评审。</td><td>工程师（中级职称）</td></tr>
                    <tr><td>激光技术与先进制造线</td><td>高级激光工程师</td><td>3-5年</td><td>6-11年</td><td>主导激光技术攻关，管理技术团队，规划激光技术路线，参与行业交流和标准制定。</td><td>通过高级工程师评审。</td><td>高级工程师（副高级职称）</td></tr>
                    <tr><td>光电传感与自动驾驶线</td><td>光电传感助理工程师</td><td>1-2年</td><td>0-2年</td><td>协助激光雷达/摄像头模组研发测试，参与光学系统设计、传感器测试、标定、系统集成和功能验证。</td><td>掌握光电传感器原理；熟悉ISO 26262等车载电子标准。</td><td>助理工程师职称</td></tr>
                    <tr><td>光电传感与自动驾驶线</td><td>光电传感工程师/激光雷达工程师</td><td>2-4年</td><td>2-6年</td><td>独立负责激光雷达系统设计，从光学设计、电子设计到系统集成全流程；参与自动驾驶感知系统方案设计和验证。</td><td>通过中级职称评审。</td><td>工程师（中级职称）</td></tr>
                    <tr><td>光电传感与自动驾驶线</td><td>高级光电传感工程师/车载光电架构师</td><td>3-5年</td><td>6-11年</td><td>主导车载光电系统架构设计，解决环境适应性、可靠性、性能优化等难题，参与自动驾驶技术路线规划。</td><td>通过高级工程师评审。</td><td>高级工程师（副高级职称）</td></tr>

                </table>

            <section aria-label="通信工程详细阶梯">

      document.body.dataset.theme = nextTheme;
      themeButtons.forEach(button => {
        const active = button.dataset.themeOption === nextTheme;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", String(active));

        localStorage.setItem("careerLadderTheme", nextTheme);

        // Theme persistence is optional; switching still works without storage.
      }
    }

              <h3 class="subhead">多条赛道与完整晋升阶梯</h3>
              <div class="tracks-grid">${trackCards}</div>
            </section>

            <details>
              <summary>核心证书</summary>
              <div class="cert-grid">${certCards}</div>
            </details>

            <section aria-label="${major.name}赛道对比表">
              <h3 class="subhead">赛道对比表</h3>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>赛道</th>
                      <th>入门特点</th>
                      <th>成长速度</th>
                      <th>职业天花板</th>
                      <th>适合人群</th>
                    </tr>
                  </thead>
                  <tbody>${comparisonRows}</tbody>
                </table>
              </div>
            </section>
            ${major.extraHtml || ""}
          </div>
        </section>
      `;
    }

    function renderPage() {
      renderNav();
      list.innerHTML = majors.map(renderMajor).join("");
      document.getElementById("majorCount").textContent = majors.length;
      document.getElementById("trackCount").textContent = majors.reduce((sum, major) => sum + major.tracks.length, 0);
      document.getElementById("certCount").textContent = majors.reduce((sum, major) => sum + major.certs.length, 0);
    }

    function applySearch() {
      const query = searchInput.value.trim().toLowerCase();
      const tokens = query.split(/\s+/).filter(Boolean);
      const sections = Array.from(document.querySelectorAll(".major-section"));
      let visible = 0;

      sections.forEach(section => {
        const haystack = section.dataset.search || "";
        const matched = tokens.length === 0 || tokens.every(token => haystack.includes(token));
        section.hidden = !matched;
        if (matched) visible += 1;
      });

      emptyState.style.display = visible === 0 ? "block" : "none";
      resultNote.style.display = query ? "block" : "none";
      resultNote.textContent = query ? `搜索“${searchInput.value.trim()}”找到 ${visible} 个专业区块。` : "";
    }

    function updateActiveNav() {
      const sections = Array.from(document.querySelectorAll(".major-section:not([hidden])"));
      const navLinks = Array.from(document.querySelectorAll("[data-nav]"));
      let activeId = sections[0]?.id;
      const offset = 160;

      for (const section of sections) {
        if (section.getBoundingClientRect().top <= offset) {
          activeId = section.id;
        }
      }

      navLinks.forEach(link => {
        link.classList.toggle("is-active", link.dataset.nav === activeId);
      });
    }

    renderPage();
    setTheme("light");
    applySearch();
    updateActiveNav();

    themeButtons.forEach(button => {
      button.addEventListener("click", () => {
        setTheme(button.dataset.themeOption);
      });
    });

    searchInput.addEventListener("input", () => {
      applySearch();
      updateActiveNav();
    });

    clearSearch.addEventListener("click", () => {
      searchInput.value = "";
      applySearch();
      searchInput.focus();
      updateActiveNav();
    });

    window.addEventListener("scroll", () => {
      backToTop.classList.toggle("is-visible", window.scrollY > 420);
      updateActiveNav();
    }, { passive: true });

    backToTop.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
  <script src="./career-blackboard-app.js"></script>
</body>
</html>
