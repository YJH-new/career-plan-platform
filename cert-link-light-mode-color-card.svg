    <rect x="28" y="68" width="146" height="42" rx="21" fill="#115e59" stroke="#0b5f63"/>
    <rect x="24" y="64" width="154" height="50" rx="25" fill="none" stroke="#0f766e" stroke-opacity="0.28" stroke-width="6"/>
