    <text x="101" y="90" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="800">报名入口</text>
    <rect x="192" y="68" width="182" height="42" rx="21" fill="#0f766e" stroke="#0b5f63"/>
    <text x="283" y="90" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" font-weight="800">官方网站</text>
