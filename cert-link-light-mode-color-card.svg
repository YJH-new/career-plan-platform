    <text x="24" y="154" fill="#51667f" font-family="Arial, sans-serif" font-size="18">#0F766E</text>
  </g>

  <g transform="translate(356 210)">
    <rect width="230" height="170" rx="16" fill="#f8fbff" stroke="#d8e3ef"/>
    <rect x="24" y="24" width="182" height="72" rx="12" fill="#115e59"/>
    <text x="24" y="126" fill="#102033" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="800">悬停底色</text>
    <text x="24" y="154" fill="#51667f" font-family="Arial, sans-serif" font-size="18">#115E59</text>
  </g>

  <g transform="translate(616 210)">
    <rect width="230" height="170" rx="16" fill="#f8fbff" stroke="#d8e3ef"/>
