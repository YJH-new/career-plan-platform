  </defs>
  <rect width="1280" height="720" fill="#eef4fb"/>
  <rect x="64" y="54" width="1152" height="612" rx="22" fill="#ffffff" stroke="#ccd8e6" filter="url(#shadow)"/>
  <text x="96" y="116" fill="#102033" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="34" font-weight="800">浅色模式核心证书链接按钮色卡</text>
  <text x="96" y="156" fill="#51667f" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18">建议用于 .cert-links a：高对比青绿色实心按钮，保持商务感，并明显区别于普通文字。</text>

  <g transform="translate(96 210)">
    <rect width="230" height="170" rx="16" fill="#f8fbff" stroke="#d8e3ef"/>
