    <text x="24" y="126" fill="#102033" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="800">按钮文字</text>
    <text x="24" y="154" fill="#51667f" font-family="Arial, sans-serif" font-size="18">#FFFFFF</text>
